<nav class="horizontal-navbar" *ngIf="authService.isLoggedIn()">

  <!-- LEFT ICON -->
  <div class="nav-left">
    <div class="circle-icon"></div>
  </div>

  <!-- CENTER LINKS -->
  <div class="nav-center">
    <ng-container *ngFor="let link of navLinks">
      <a [routerLink]="link.route"
         routerLinkActive="active"
         class="nav-link"
         [class.has-unread]="link.route.includes('messagerie') && messagerieCount > 0">

        {{ link.route.includes('messagerie') ? 'Talk with Local Partner' : link.label }}

        <span class="dot"
              *ngIf="link.route.includes('messagerie') && messagerieCount > 0">
        </span>
      </a>
    </ng-container>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">

    <!-- Talk to Admin -->
    <a [routerLink]="['/chat']"
       routerLinkActive="active"
       class="nav-link">

      Talk to Admin

      <span class="dot" *ngIf="unreadCount > 0"></span>
    </a>

    <!-- PROFILE -->
    <div class="profile-section" (click)="goToProfile()">
      <div class="avatar-container">

        <img *ngIf="getProfilePhoto()"
             [src]="getProfilePhoto()"
             (error)="handleImageError($event)"
             class="avatar-image">

        <div class="avatar-fallback" [class.hidden]="getProfilePhoto()">
          {{ userInitials }}
        </div>

      </div>
    </div>

    <!-- LOGOUT -->
    <button class="btn-logout" (click)="logout()">Logout</button>

  </div>

</nav>
