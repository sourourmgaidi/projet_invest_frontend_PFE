<div class="dashboard-container">
  <app-navbar></app-navbar>
  <main class="dashboard-content">

    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h1>Economic Partner Dashboard</h1>
        <p>Manage your economic partnerships.</p>
      </div>
      <app-notification-bell></app-notification-bell>
    </div>

    <div class="stats-cards">
      <a routerLink="/my-stats" class="stat-card" style="text-decoration: none; display: block; cursor: pointer;">
          <div class="stat-details">
            <h3>My Activity</h3>
            <p class="stat-value">Stats</p>
            <span class="stat-trend">View my session stats</span>
          </div>
        </a>
      <!-- Collaboration Opportunities Card avec lien et compteur -->
      <a routerLink="/partenaire-economique/services" class="stat-card" style="text-decoration: none; display: block; cursor: pointer;">
        <h3>Collaboration Opportunities</h3>
        <p class="stat-number">{{ collaborationCount }}</p>
      </a>

      <!-- Messages Card (sans lien) -->
      <div class="stat-card">
        <h3>Messages</h3>
        <p class="stat-number">{{ unreadCount }}</p>
      </div>
    </div>
  </main>
</div>
<app-chatbot-widget></app-chatbot-widget>
