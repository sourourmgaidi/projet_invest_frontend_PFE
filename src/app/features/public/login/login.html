<div class="login-page">

  <a routerLink="/" class="home-link">{{ 'LOGIN.HOME' | translate }}</a>

  <div class="login-container">
    <div class="login-card">

      <div class="card-header">
        <h2>{{ 'LOGIN.TITLE' | translate }}</h2>
        <p class="subtitle">{{ 'LOGIN.SUBTITLE' | translate }}</p>
      </div>

      <div class="error-message" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">

        <div class="form-group">
          <label for="email">{{ 'LOGIN.EMAIL' | translate }}</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate"
              required
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" (click)="togglePassword()">
              {{ showPassword ? ('LOGIN.HIDE' | translate) : ('LOGIN.SHOW' | translate) }}
            </button>
          </div>
        </div>

        <div class="form-options">
          <a routerLink="/forgot-password" class="forgot-link">
            {{ 'LOGIN.FORGOT' | translate }}
          </a>
        </div>

        <button type="submit" class="submit-button" [disabled]="loading">
          <span *ngIf="!loading">{{ 'LOGIN.SUBMIT' | translate }}</span>
          <span *ngIf="loading" class="loading-spinner">
            <span class="spinner"></span>
            {{ 'LOGIN.SUBMITTING' | translate }}
          </span>
        </button>

      </form>

      <div class="login-footer">
        <p>{{ 'FOOTER.COPYRIGHT' | translate }}</p>
      </div>

    </div>
  </div>

</div>
